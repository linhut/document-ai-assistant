name: Star History

on:
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小时更新一次
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: narayann7/star-history-action@v1
        with:
          repos: ${{ github.repository }}
