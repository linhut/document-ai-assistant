# ============================================================
# GitHub Actions: 多平台自动发布
# ============================================================
# 触发条件：推送 v* tag（如 v1.4.8）
# 产物：Windows x64/ARM64 / Linux x64 / macOS x64/ARM64 / 便携版 / CLI
# ============================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.4.8)'
        required: true

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # -----------------------------------------------------------
  # Job 1: 构建 PyInstaller 后端 (Windows)
  # -----------------------------------------------------------
  build-backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend server
        shell: bash
        run: |
          cd backend
          pyinstaller --onefile --name backend_server \
            --add-data "core;core" --add-data "api;api" --add-data "ai;ai" \
            --add-data "db;db" --add-data "services;services" --add-data "utils;utils" \
            --add-data "../rules;rules" --add-data "../templates;templates" \
            --hidden-import uvicorn --hidden-import fastapi --hidden-import sqlalchemy \
            --hidden-import pydantic --hidden-import httpx --hidden-import docx \
            main.py

      - name: Build CLI
        shell: bash
        run: |
          cd backend
          pyinstaller --onefile --name doc-optimizer-cli \
            --add-data "core;core" --add-data "utils;utils" --add-data "../rules;rules" \
            --hidden-import yaml --hidden-import docx \
            wfp_cli.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-win-x64
          path: |
            backend/dist/backend_server.exe
            backend/dist/doc-optimizer-cli.exe

  # -----------------------------------------------------------
  # Job 2: 构建 Electron 前端 (按平台)
  # -----------------------------------------------------------
  build-frontend:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            arch: x64
            pyinstaller_sep: ";"
          - os: windows-latest
            platform: win-arm64
            arch: arm64
            pyinstaller_sep: ";"
          - os: ubuntu-latest
            platform: linux-x64
            arch: x64
            pyinstaller_sep: ":"
          - os: macos-latest
            platform: mac-x64
            arch: x64
            pyinstaller_sep: ":"
          - os: macos-latest
            platform: mac-arm64
            arch: arm64
            pyinstaller_sep: ":"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build PyInstaller backend
        shell: bash
        run: |
          pip install pyinstaller
          cd backend
          pyinstaller --onefile --name backend_server \
            --add-data "core${{ matrix.pyinstaller_sep }}core" \
            --add-data "api${{ matrix.pyinstaller_sep }}api" \
            --add-data "ai${{ matrix.pyinstaller_sep }}ai" \
            --add-data "db${{ matrix.pyinstaller_sep }}db" \
            --add-data "services${{ matrix.pyinstaller_sep }}services" \
            --add-data "utils${{ matrix.pyinstaller_sep }}utils" \
            --add-data "../rules${{ matrix.pyinstaller_sep }}rules" \
            --add-data "../templates${{ matrix.pyinstaller_sep }}templates" \
            --add-data "config.py${{ matrix.pyinstaller_sep }}." \
            --add-data "wfp_cli.py${{ matrix.pyinstaller_sep }}." \
            --add-data "verify_all.py${{ matrix.pyinstaller_sep }}." \
            --hidden-import uvicorn --hidden-import fastapi --hidden-import sqlalchemy \
            --hidden-import pydantic --hidden-import httpx --hidden-import docx \
            --hidden-import config --hidden-import auth \
            --hidden-import core.document.models --hidden-import core.document.font_utils \
            --hidden-import core.rules.engine --hidden-import core.rules.loader \
            --hidden-import core.rules.manager --hidden-import core.rules.fixer \
            --hidden-import core.document.parser --hidden-import core.document.generator \
            --hidden-import core.document.modifier --hidden-import core.document.parser_format \
            --hidden-import core.template.style_manager --hidden-import core.template.generator \
            --hidden-import utils.logger --hidden-import utils.file_utils \
            --hidden-import utils.crypto --hidden-import utils.db_backup \
            --hidden-import db.database --hidden-import db.models \
            --hidden-import services.document_service \
            --hidden-import api.routes.documents --hidden-import api.routes.check \
            --hidden-import api.routes.optimize --hidden-import api.routes.ai \
            --hidden-import api.routes.settings --hidden-import api.routes.templates \
            --hidden-import api.routes.template_download --hidden-import api.routes.rules \
            --hidden-import api.routes.office --hidden-import api.routes.auth \
            --hidden-import api.schemas.api_models \
            --hidden-import cryptography --hidden-import cryptography.fernet \
            --hidden-import cryptography.hazmat --hidden-import cryptography.hazmat.backends \
            --hidden-import cryptography.hazmat.primitives --hidden-import cryptography.hazmat.primitives.ciphers \
            --hidden-import yaml --hidden-import aiofiles --hidden-import multipart \
            --hidden-import lxml --hidden-import lxml.etree --hidden-import lxml.objectify \
            --hidden-import websockets --hidden-import anyio \
            --hidden-import email.mime.text --hidden-import email.mime.multipart \
            main.py

      - name: Prepare dist-resources
        shell: bash
        run: |
          mkdir -p frontend/dist-resources/backend/backend_server
          # 处理平台差异：Windows 产 backend_server.exe，Linux/macOS 产 backend_server
          if [ -f "backend/dist/backend_server.exe" ]; then
            cp backend/dist/backend_server.exe frontend/dist-resources/backend/backend_server/
          elif [ -f "backend/dist/backend_server" ]; then
            cp backend/dist/backend_server frontend/dist-resources/backend/backend_server/
          else
            echo "ERROR: backend_server not found in backend/dist/"
            ls -la backend/dist/
            exit 1
          fi
          cp -r rules frontend/dist-resources/backend/rules
          cp -r templates frontend/dist-resources/backend/templates
          mkdir -p frontend/dist-resources/backend/TTF
          mkdir -p frontend/dist-resources/backend/data

      - name: Build frontend + Electron
        shell: bash
        run: |
          cd frontend
          npm run build
          npx tsc -p tsconfig.electron.json
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npx electron-builder --win --${{ matrix.arch }} --publish=never
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            npx electron-builder --linux --${{ matrix.arch }} --publish=never
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            npx electron-builder --mac --${{ matrix.arch }} --publish=never
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ matrix.platform }}
          path: |
            frontend/release/*.exe
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.dmg
            frontend/release/*.zip
          if-no-files-found: warn

  # -----------------------------------------------------------
  # Job 3: 构建便携版 (Windows)
  # -----------------------------------------------------------
  build-portable:
    runs-on: windows-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build frontend (web)
        run: |
          cd frontend
          npm run build

      - name: Download backend
        uses: actions/download-artifact@v4
        with:
          name: backend-win-x64
          path: dist/

      - name: Create portable package
        shell: bash
        run: |
          echo "=== Contents of dist/ ==="
          find dist/ -type f -name "*.exe" 2>/dev/null || ls -laR dist/ | head -30
          mkdir -p portable/doc-optimizer
          if [ -f "dist/backend/dist/backend_server.exe" ]; then
            cp dist/backend/dist/backend_server.exe portable/doc-optimizer/
          elif [ -f "dist/backend_server.exe" ]; then
            cp dist/backend_server.exe portable/doc-optimizer/
          fi
          cp -r frontend/dist portable/doc-optimizer/frontend
          cp -r rules portable/doc-optimizer/rules
          cp -r templates portable/doc-optimizer/templates
          if [ -f "dist/backend/dist/doc-optimizer-cli.exe" ]; then
            cp dist/backend/dist/doc-optimizer-cli.exe portable/doc-optimizer/
          elif [ -f "dist/doc-optimizer-cli.exe" ]; then
            cp dist/doc-optimizer-cli.exe portable/doc-optimizer/
          fi
          cd portable
          python -c "import shutil; shutil.make_archive('../doc-optimizer-portable', 'zip', '.', 'doc-optimizer')"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portable-win-x64
          path: doc-optimizer-portable.zip

  # -----------------------------------------------------------
  # Job 4: 创建 GitHub Release
  # -----------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-portable]
    if: always() && needs.build-frontend.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List downloaded artifacts
        run: find artifacts/ -type f | head -30

      - name: Prepare release notes
        shell: bash
        run: |
          RELEASE_NOTES="packaging/release-notes-${{ github.ref_name }}.md"
          if [ -f "$RELEASE_NOTES" ]; then
            echo "Found release notes: $RELEASE_NOTES"
          else
            echo "# Release ${{ github.ref_name }}" > "$RELEASE_NOTES"
            echo "" >> "$RELEASE_NOTES"
            echo "Automatically generated release for ${{ github.ref_name }}." >> "$RELEASE_NOTES"
            echo "See packaging/ directory for available release notes." >> "$RELEASE_NOTES"
            echo "Created fallback release notes: $RELEASE_NOTES"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: packaging/release-notes-${{ github.ref_name }}.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
