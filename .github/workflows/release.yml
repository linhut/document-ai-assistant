# ============================================================
# GitHub Actions: 多平台自动发布
# ============================================================
# 触发条件：推送 v* tag（如 v1.4.8）
# 产物：Windows x64/ARM64 / Linux x64 / macOS x64/ARM64 / 便携版 / CLI
# ============================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.4.8)'
        required: true

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # -----------------------------------------------------------
  # Job 1: 构建 PyInstaller 后端 (Windows)
  # -----------------------------------------------------------
  build-backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend server
        shell: bash
        run: |
          cd backend
          pyinstaller --onefile --name backend_server \
            --add-data "core;core" --add-data "api;api" --add-data "ai;ai" \
            --add-data "db;db" --add-data "services;services" --add-data "utils;utils" \
            --add-data "../rules;rules" --add-data "../templates;templates" \
            --hidden-import uvicorn --hidden-import fastapi --hidden-import sqlalchemy \
            --hidden-import pydantic --hidden-import httpx --hidden-import docx \
            main.py

      - name: Build CLI
        shell: bash
        run: |
          cd backend
          pyinstaller --onefile --name doc-optimizer-cli \
            --add-data "core;core" --add-data "utils;utils" --add-data "../rules;rules" \
            --hidden-import yaml --hidden-import docx \
            wfp_cli.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-win-x64
          path: |
            backend/dist/backend_server.exe
            backend/dist/doc-optimizer-cli.exe

  # -----------------------------------------------------------
  # Job 2: 构建 Electron 前端 (按平台)
  # -----------------------------------------------------------
  build-frontend:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            arch: x64
            pyinstaller_sep: ";"
          - os: windows-latest
            platform: win-arm64
            arch: arm64
            pyinstaller_sep: ";"
          - os: ubuntu-latest
            platform: linux-x64
            arch: x64
            pyinstaller_sep: ":"
          - os: macos-latest
            platform: mac-x64
            arch: x64
            pyinstaller_sep: ":"
          - os: macos-latest
            platform: mac-arm64
            arch: arm64
            pyinstaller_sep: ":"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build PyInstaller backend
        shell: bash
        run: |
          pip install pyinstaller
          cd backend
          pyinstaller --onefile --name backend_server \
            --add-data "core${{ matrix.pyinstaller_sep }}core" \
            --add-data "api${{ matrix.pyinstaller_sep }}api" \
            --add-data "ai${{ matrix.pyinstaller_sep }}ai" \
            --add-data "db${{ matrix.pyinstaller_sep }}db" \
            --add-data "services${{ matrix.pyinstaller_sep }}services" \
            --add-data "utils${{ matrix.pyinstaller_sep }}utils" \
            --add-data "../rules${{ matrix.pyinstaller_sep }}rules" \
            --add-data "../templates${{ matrix.pyinstaller_sep }}templates" \
            --hidden-import uvicorn --hidden-import fastapi --hidden-import sqlalchemy \
            --hidden-import pydantic --hidden-import httpx --hidden-import docx \
            main.py

      - name: Prepare dist-resources
        shell: bash
        run: |
          mkdir -p frontend/dist-resources/backend
          cp backend/dist/backend_server frontend/dist-resources/backend/
          cp -r rules frontend/dist-resources/backend/rules
          cp -r templates frontend/dist-resources/backend/templates
          mkdir -p frontend/dist-resources/backend/TTF
          mkdir -p frontend/dist-resources/backend/data

      - name: Build frontend + Electron
        shell: bash
        run: |
          cd frontend
          npm run build
          npx tsc -p tsconfig.electron.json
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npx electron-builder --win --${{ matrix.arch }} --publish=never
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            npx electron-builder --linux --${{ matrix.arch }} --publish=never
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            npx electron-builder --mac --${{ matrix.arch }} --publish=never
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ matrix.platform }}
          path: |
            frontend/release/*.exe
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.dmg
            frontend/release/*.zip
          if-no-files-found: warn

  # -----------------------------------------------------------
  # Job 3: 构建便携版 (Windows)
  # -----------------------------------------------------------
  build-portable:
    runs-on: windows-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build frontend (web)
        run: |
          cd frontend
          npm run build

      - name: Download backend
        uses: actions/download-artifact@v4
        with:
          name: backend-win-x64
          path: dist/

      - name: Create portable package
        shell: bash
        run: |
          mkdir -p portable/doc-optimizer
          cp dist/backend/dist/backend_server.exe portable/doc-optimizer/
          cp -r frontend/dist portable/doc-optimizer/frontend
          cp -r rules portable/doc-optimizer/rules
          cp -r templates portable/doc-optimizer/templates
          cp dist/backend/dist/doc-optimizer-cli.exe portable/doc-optimizer/
          cd portable
          python -c "import shutil; shutil.make_archive('../doc-optimizer-portable', 'zip', '.', 'doc-optimizer')"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portable-win-x64
          path: doc-optimizer-portable.zip

  # -----------------------------------------------------------
  # Job 4: 创建 GitHub Release
  # -----------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-portable]
    if: always() && needs.build-frontend.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List downloaded artifacts
        run: find artifacts/ -type f | head -30

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ github.ref_name }}
          body_path: packaging/release-notes-${{ github.ref_name }}.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
