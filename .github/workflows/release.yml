# ============================================================
# GitHub Actions: 多平台自动发布
# 参考 Word-Formatter-Pro 的发布流程
# ============================================================
# 触发条件：推送 v* tag（如 v1.4.8）
# 产物：Windows x64/ARM64 / Linux x64 / macOS x64/ARM64 / 便携版 / CLI
# ============================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.4.8)'
        required: true

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # -----------------------------------------------------------
  # Job 1: 构建 PyInstaller 后端
  # -----------------------------------------------------------
  build-backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend server
        run: |
          cd backend
          pyinstaller --onefile --name backend_server \
            --add-data "core;core" --add-data "api;api" --add-data "ai;ai" \
            --add-data "db;db" --add-data "services;services" --add-data "utils;utils" \
            --add-data "../rules;rules" --add-data "../templates;templates" \
            --hidden-import uvicorn --hidden-import fastapi --hidden-import sqlalchemy \
            --hidden-import pydantic --hidden-import httpx --hidden-import docx \
            main.py

      - name: Build CLI
        run: |
          cd backend
          pyinstaller --onefile --name doc-optimizer-cli \
            --add-data "core;core" --add-data "utils;utils" --add-data "../rules;rules" \
            --hidden-import yaml --hidden-import docx \
            wfp_cli.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-win-x64
          path: |
            dist/backend_server.exe
            dist/doc-optimizer-cli.exe

  # -----------------------------------------------------------
  # Job 2: 构建 Electron 前端
  # -----------------------------------------------------------
  build-frontend:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            build_cmd: npm run electron:build:win
          - os: windows-latest
            platform: win-arm64
            build_cmd: npm run electron:build:win -- --arm64
          - os: ubuntu-latest
            platform: linux-x64
            build_cmd: npm run electron:build:linux
          - os: macos-latest
            platform: mac-x64
            build_cmd: npm run electron:build:mac
          - os: macos-latest
            platform: mac-arm64
            build_cmd: npm run electron:build:mac -- --arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build PyInstaller backend
        run: |
          pip install pyinstaller
          cd backend
          pyinstaller --onefile --name backend_server \
            --add-data "core;core" --add-data "api;api" --add-data "ai;ai" \
            --add-data "db;db" --add-data "services;services" --add-data "utils;utils" \
            --add-data "../rules;rules" --add-data "../templates;templates" \
            --hidden-import uvicorn --hidden-import fastapi --hidden-import sqlalchemy \
            --hidden-import pydantic --hidden-import httpx --hidden-import docx \
            main.py

      - name: Build frontend
        run: |
          cd frontend
          ${{ matrix.build_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ matrix.platform }}
          path: frontend/dist_electron/*

  # -----------------------------------------------------------
  # Job 3: 构建便携版
  # -----------------------------------------------------------
  build-portable:
    runs-on: windows-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend (web)
        run: |
          cd frontend
          npm run build

      - name: Download backend
        uses: actions/download-artifact@v4
        with:
          name: backend-win-x64
          path: dist/

      - name: Create portable package
        run: |
          mkdir -p portable/doc-optimizer
          cp dist/backend_server.exe portable/doc-optimizer/
          cp -r frontend/dist portable/doc-optimizer/frontend
          cp -r rules portable/doc-optimizer/rules
          cp -r templates portable/doc-optimizer/templates
          cp dist/doc-optimizer-cli.exe portable/doc-optimizer/
          cd portable
          zip -r ../doc-optimizer-v${GITHUB_REF_NAME#v}-portable.zip doc-optimizer

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portable-win-x64
          path: doc-optimizer-*-portable.zip

  # -----------------------------------------------------------
  # Job 4: 创建 GitHub Release
  # -----------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-portable]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ github.ref_name }}
          body_path: packaging/release-notes-${{ github.ref_name }}.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
