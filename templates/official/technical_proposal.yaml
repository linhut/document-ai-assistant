# ============================================================
# 技术方案 - 样式模板
# 非 GB/T 9704 标准公文
# 正文使用四号字(14pt)，区别于标准公文的三号字(16pt)
# ============================================================

name: "技术方案"
type: "technical_proposal"
version: "1.0"
author: "公文智能优化助手"
standard: "自定义"

page:
  size: "A4"
  margins:
    top: "3.7cm"
    bottom: "3.5cm"
    left: "2.8cm"
    right: "2.6cm"

styles:
  title:
    style_name: "公文标题"
    font_east_asia: "方正小标宋简体"
    font_latin: "Times New Roman"
    size: "22pt"
    bold: false
    alignment: "center"
    space_after: "20pt"

  body:
    style_name: "公文正文"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "14pt"
    alignment: "justify"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  subtitle:
    style_name: "公文小标题"
    font_east_asia: "黑体"
    font_latin: "Times New Roman"
    size: "14pt"
    bold: true
    alignment: "left"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  signature:
    style_name: "公文落款"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "14pt"
    alignment: "right"

sample:
  title: "XXX技术方案"
  paragraphs:
    - ""
    - "一、项目背景"
    - "（技术现状和需求分析）"
    - ""
    - "二、方案设计"
    - "（一）方案一：XXX。"
    - "（具体内容）"
    - "（二）方案二：XXX。"
    - "（具体内容）"
    - "（三）方案对比分析。"
    - "（具体内容）"
    - ""
    - "三、实施计划"
    - "（一）准备阶段（XXXX年XX月—XX月）。"
    - "（二）实施阶段（XXXX年XX月—XX月）。"
    - "（三）验收阶段（XXXX年XX月—XX月）。"
    - ""
    - "四、风险分析与保障措施"
    - "（具体内容）"
    - ""
    - ""
    - "（编制单位）"
    - "XXXX年XX月XX日"
