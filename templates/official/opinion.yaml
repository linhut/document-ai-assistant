# ============================================================
# 意见 - 样式模板
# 对重要问题提出见解和处理办法
# 基于 GB/T 9704-2012 党政机关公文格式
# ============================================================

name: "意见"
type: "opinion"
version: "1.0"
author: "公文智能优化助手"
standard: "GB/T 9704-2012"

page:
  size: "A4"
  margins:
    top: "3.7cm"
    bottom: "3.5cm"
    left: "2.8cm"
    right: "2.6cm"

styles:
  title:
    style_name: "公文标题"
    font_east_asia: "方正小标宋简体"
    font_latin: "Times New Roman"
    size: "22pt"
    bold: false
    alignment: "center"
    space_after: "20pt"

  body:
    style_name: "公文正文"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "16pt"
    alignment: "justify"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  subtitle:
    style_name: "公文小标题"
    font_east_asia: "黑体"
    font_latin: "Times New Roman"
    size: "16pt"
    bold: true
    alignment: "left"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  signature:
    style_name: "公文落款"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "16pt"
    alignment: "right"

sample:
  title: "关于XXX工作的意见"
  paragraphs:
    - "为深入贯彻落实XXX精神，进一步做好XXX工作，现提出如下意见："
    - ""
    - "一、总体要求"
    - "（一）指导思想。"
    - "（具体内容）"
    - "（二）基本原则。"
    - "（具体内容）"
    - ""
    - "二、主要措施"
    - "（一）XXX。"
    - "（二）XXX。"
    - "（三）XXX。"
    - ""
    - "三、组织保障"
    - "（一）加强组织领导。"
    - "（二）强化督促检查。"
    - "（三）营造良好氛围。"
    - ""
    - ""
    - "（单位名称）"
    - "XXXX年XX月XX日"
