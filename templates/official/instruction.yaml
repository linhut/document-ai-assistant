# ============================================================
# 指示 - 样式模板
# 对下级机关布置工作、阐明工作活动的指导原则
# 基于 GB/T 9704-2012 党政机关公文格式
# ============================================================

name: "指示"
type: "instruction"
version: "1.0"
author: "公文智能优化助手"
standard: "GB/T 9704-2012"

# 页面设置
page:
  size: "A4"
  margins:
    top: "3.7cm"
    bottom: "3.5cm"
    left: "2.8cm"
    right: "2.6cm"

# 样式定义
styles:
  title:
    style_name: "公文标题"
    font_east_asia: "方正小标宋简体"
    font_latin: "Times New Roman"
    size: "22pt"
    bold: false
    alignment: "center"
    space_after: "20pt"

  body:
    style_name: "公文正文"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "16pt"
    alignment: "justify"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  subtitle:
    style_name: "公文小标题"
    font_east_asia: "黑体"
    font_latin: "Times New Roman"
    size: "16pt"
    bold: true
    alignment: "left"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  signature:
    style_name: "公文落款"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "16pt"
    alignment: "right"

# 示例内容
sample:
  title: "关于XXX工作的指示"
  paragraphs:
    - "各部门、各单位："
    - ""
    - "当前，XXX工作面临新的形势和任务。为切实做好XXX工作，现作如下指示："
    - "一、充分认识XXX工作的重要意义"
    - "（具体内容）"
    - "二、明确XXX工作的总体要求和目标任务"
    - "（具体内容）"
    - "三、切实加强XXX工作的组织领导"
    - "（具体内容）"
    - "各级各部门要认真贯彻落实本指示精神，确保各项工作落到实处。"
    - ""
    - ""
    - "（单位名称）"
    - "XXXX年XX月XX日"
