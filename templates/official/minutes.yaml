# ============================================================
# 纪要 - 样式模板
# 记载会议主要精神和议定事项
# 基于 GB/T 9704-2012 党政机关公文格式
# ============================================================

name: "纪要"
type: "minutes"
version: "1.0"
author: "公文智能优化助手"
standard: "GB/T 9704-2012"

# 页面设置
page:
  size: "A4"
  margins:
    top: "3.7cm"
    bottom: "3.5cm"
    left: "2.8cm"
    right: "2.6cm"

# 样式定义
styles:
  title:
    style_name: "公文标题"
    font_east_asia: "方正小标宋简体"
    font_latin: "Times New Roman"
    size: "22pt"
    bold: false
    alignment: "center"
    space_after: "20pt"

  body:
    style_name: "公文正文"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "16pt"
    alignment: "justify"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  subtitle:
    style_name: "公文小标题"
    font_east_asia: "黑体"
    font_latin: "Times New Roman"
    size: "16pt"
    bold: true
    alignment: "left"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  signature:
    style_name: "公文落款"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "16pt"
    alignment: "right"

# 示例内容
sample:
  title: "XXX会议纪要"
  paragraphs:
    - "时间：XXXX年XX月XX日"
    - "地点：XXX会议室"
    - "主持人：XXX"
    - "出席人员：XXX、XXX、XXX"
    - "缺席人员：XXX"
    - "记录人：XXX"
    - ""
    - "会议议定事项如下："
    - ""
    - "一、关于XXX事项"
    - "会议认为，（具体内容）。"
    - "会议决定，（具体内容）。"
    - ""
    - "二、关于XXX事项"
    - "会议认为，（具体内容）。"
    - "会议决定，（具体内容）。"
    - ""
    - ""
    - "（单位名称）"
    - "XXXX年XX月XX日"
