# ============================================================
# 议案 - 样式模板
# 向人大或人大常委会提出审议的方案
# ============================================================

name: "议案"
type: "bill"
version: "1.0"
author: "公文智能优化助手"
standard: "GB/T 9704-2012"

page:
  size: "A4"
  margins:
    top: "3.7cm"
    bottom: "3.5cm"
    left: "2.8cm"
    right: "2.6cm"

styles:
  title:
    style_name: "公文标题"
    font_east_asia: "方正小标宋简体"
    font_latin: "Times New Roman"
    size: "22pt"
    bold: false
    alignment: "center"
    space_after: "20pt"

  body:
    style_name: "公文正文"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "16pt"
    alignment: "justify"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  subtitle:
    style_name: "公文小标题"
    font_east_asia: "黑体"
    font_latin: "Times New Roman"
    size: "16pt"
    bold: true
    alignment: "left"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  signature:
    style_name: "公文落款"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "16pt"
    alignment: "right"

sample:
  title: "关于提请审议《XXX（草案）》的议案"
  paragraphs:
    - "XXX（受文机关）："
    - ""
    - "为了XXX，根据XXX，XXX拟定了《XXX（草案）》。该草案已经XXX会议讨论通过，现提请审议。"
    - ""
    - "一、案由"
    - "（具体内容）"
    - ""
    - "二、案据"
    - "（具体内容）"
    - ""
    - "三、方案"
    - "（具体内容）"
    - ""
    - ""
    - "提案人（单位）：XXX"
    - "XXXX年XX月XX日"
