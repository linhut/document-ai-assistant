# ============================================================
# 决议 - 样式模板
# 经会议讨论通过的重大事项决策
# 基于 GB/T 9704-2012 党政机关公文格式
# ============================================================

name: "决议"
type: "resolution"
version: "1.0"
author: "公文智能优化助手"
standard: "GB/T 9704-2012"

page:
  size: "A4"
  margins:
    top: "3.7cm"
    bottom: "3.5cm"
    left: "2.8cm"
    right: "2.6cm"

styles:
  title:
    style_name: "公文标题"
    font_east_asia: "方正小标宋简体"
    font_latin: "Times New Roman"
    size: "22pt"
    bold: false
    alignment: "center"
    space_after: "20pt"

  body:
    style_name: "公文正文"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "16pt"
    alignment: "justify"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  subtitle:
    style_name: "公文小标题"
    font_east_asia: "黑体"
    font_latin: "Times New Roman"
    size: "16pt"
    bold: true
    alignment: "left"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  signature:
    style_name: "公文落款"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "16pt"
    alignment: "right"

sample:
  title: "关于XXX的决议"
  paragraphs:
    - "（XXXX年XX月XX日XXX会议通过）"
    - ""
    - "XXX会议审议了关于XXX的报告，同意XXX，决定XXX。"
    - ""
    - "一、（决议事项）"
    - "二、（决议事项）"
    - "三、（决议事项）"
    - ""
    - "会议要求，（执行要求）。"
    - ""
    - ""
    - "（会议名称）"
    - "XXXX年XX月XX日"
