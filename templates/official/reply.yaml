# ============================================================
# 批复 - 样式模板
# 答复下级机关请示事项
# 基于 GB/T 9704-2012 党政机关公文格式
# ============================================================

name: "批复"
type: "reply"
version: "1.0"
author: "公文智能优化助手"
standard: "GB/T 9704-2012"

page:
  size: "A4"
  margins:
    top: "3.7cm"
    bottom: "3.5cm"
    left: "2.8cm"
    right: "2.6cm"

styles:
  title:
    style_name: "公文标题"
    font_east_asia: "方正小标宋简体"
    font_latin: "Times New Roman"
    size: "22pt"
    bold: false
    alignment: "center"
    space_after: "20pt"

  body:
    style_name: "公文正文"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "16pt"
    alignment: "justify"
    line_spacing: "28.95pt"
    first_line_indent: "2em"

  signature:
    style_name: "公文落款"
    font_east_asia: "仿宋_GB2312"
    font_latin: "Times New Roman"
    size: "16pt"
    alignment: "right"

sample:
  title: "关于XXX事项的批复"
  paragraphs:
    - "XXX（下级机关）："
    - ""
    - "你单位《关于XXX的请示》（X〔XXXX〕X号）收悉。经研究，现批复如下："
    - "一、同意XXX。"
    - "二、XXX。"
    - "三、请按照XXX要求，认真组织实施。"
    - "此复。"
    - ""
    - ""
    - "（单位名称）"
    - "XXXX年XX月XX日"
