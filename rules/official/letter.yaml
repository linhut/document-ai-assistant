template_name: 函
document_type: letter
title:
  font: 方正小标宋简体
  font_fallback: SimSun
  size: 22pt
  align: center
  bold: false
body:
  font: 仿宋_GB2312
  font_fallback: FangSong
  size: 16pt
  line_spacing: 28.95pt
  first_line_indent: 2em
  align: justify
check_rules:
- id: CHK-L001
  name: 标题字体检查
  severity: P0
  field: title.font
  expected: 方正小标宋简体
  message: 标题应使用方正小标宋简体
- id: CHK-L002
  name: 标题字号检查
  severity: P0
  field: title.size
  expected: 22pt
  message: 标题应使用二号字(22pt)
- id: CHK-L003
  name: 称谓检查
  severity: P1
  field: salutation.check
  expected: 使用规范机关称谓
  message: 称谓应使用全称或规范化简称
- id: CHK-L004
  name: 结束语检查
  severity: P1
  field: ending.check
  expected: 包含规范结束语
  message: 函应以'特此函复'、'请予函复'等结束语结尾
- id: CHK-L005
  name: 语言规范检查
  severity: P2
  field: language.formal
  expected: 语言规范得体
  message: 函的语言应规范、得体、简明
- id: CHK-L006
  severity: P0
  field: body.font
  expected: 仿宋_GB2312
  name: 正文字体
  message: 正文应使用仿宋_GB2312字体
- id: CHK-L007
  severity: P0
  field: body.size
  expected: 16pt
  name: 正文字号
  message: 正文应使用三号字（16pt）
- id: CHK-L008
  severity: P1
  field: body.first_line_indent
  expected: 2em
  name: 正文首行缩进
  message: 正文首行应缩进2字符
- id: CHK-L009
  severity: P1
  field: body.line_spacing
  expected: 28.95pt
  name: 正文行距
  message: 正文行距应为固定值28-29磅
fix_rules:
- id: FIX-L001
  ref_check: CHK-L001
  action: set_font
  target: doc_title
  value: 方正小标宋简体
- id: FIX-L002
  ref_check: CHK-L002
  action: set_size
  target: doc_title
  value: 22pt
- id: FIX-L003
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-L004
  action: set_size
  target: body
  value: 16pt
- id: FIX-L005
  action: set_align
  target: signature
  value: right
- id: FIX-L006
  action: set_first_line_indent
  target: body
  value: 2em
- id: FIX-L007
  action: set_line_spacing
  target: body
  value: 28.95pt
- id: FIX-L008
  action: set_alignment
  target: body
  value: justify
- id: FIX-L006
  ref_check: CHK-L006
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-L007
  ref_check: CHK-L007
  action: set_size
  target: body
  value: 16pt
- id: FIX-L001
  ref_check: CHK-L008
  action: set_first_line_indent
  target: body
  value: 2em
- id: FIX-L001
  ref_check: CHK-L009
  action: set_line_spacing
  target: body
  value: 28.95pt
