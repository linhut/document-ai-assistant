template_name: 函
document_type: letter

check_rules:
  - id: CHK-L001
    name: 称谓检查
    severity: P1
    field: salutation.check
    expected: 使用规范机关称谓
    message: 称谓应使用全称或规范化简称
    category: content

  - id: CHK-L002
    name: 结束语检查
    severity: P1
    field: ending.check
    expected: 包含规范结束语
    message: 函应以"特此函复"、"请予函复"等结束语结尾
    category: content

  - id: CHK-L003
    name: 语言规范检查
    severity: P2
    field: language.formal
    expected: 语言规范得体
    message: 函的语言应规范、得体、简明
    category: content
fix_rules: []
