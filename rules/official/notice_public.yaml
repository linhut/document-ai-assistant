template_name: 公告
document_type: notice_public
title:
  font: 方正小标宋简体
  font_fallback: SimSun
  size: 22pt
  align: center
  bold: false
body:
  font: 仿宋_GB2312
  font_fallback: FangSong
  size: 16pt
  line_spacing: 28.95pt
  first_line_indent: 2em
  align: justify
check_rules:
- id: CHK-NP001
  name: 标题字体检查
  severity: P0
  field: title.font
  expected: 方正小标宋简体
  message: 标题应使用方正小标宋简体
- id: CHK-NP002
  name: 标题字号检查
  severity: P0
  field: title.size
  expected: 22pt
  message: 标题应使用二号字(22pt)
- id: CHK-NP003
  name: 正式表达检查
  severity: P1
  field: language.formal
  expected: 语言正式规范
  message: 公告语言应正式、规范、庄重
- id: CHK-NP004
  name: 格式规范检查
  severity: P0
  field: format.standard
  expected: 符合公文格式规范
  message: 公告格式应符合GB/T 9704公文格式规范
- id: CHK-NP005
  name: 落款检查
  severity: P1
  field: signature.align
  expected: right
  message: 落款应右对齐
- id: CHK-NP006
  severity: P0
  field: body.font
  expected: 仿宋_GB2312
  name: 正文字体
  message: 正文应使用仿宋_GB2312字体
- id: CHK-NP007
  severity: P0
  field: body.size
  expected: 16pt
  name: 正文字号
  message: 正文应使用三号字（16pt）
- id: CHK-NP008
  severity: P1
  field: body.first_line_indent
  expected: 2em
  name: 正文首行缩进
  message: 正文首行应缩进2字符
- id: CHK-NP009
  severity: P1
  field: body.line_spacing
  expected: 28.95pt
  name: 正文行距
  message: 正文行距应为固定值28-29磅
fix_rules:
- id: FIX-NP001
  ref_check: CHK-NP001
  action: set_font
  target: doc_title
  value: 方正小标宋简体
- id: FIX-NP002
  ref_check: CHK-NP002
  action: set_size
  target: doc_title
  value: 22pt
- id: FIX-NP003
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-NP004
  action: set_size
  target: body
  value: 16pt
- id: FIX-NP005
  action: set_align
  target: signature
  value: right
- id: FIX-NP006
  ref_check: CHK-NP006
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-NP007
  ref_check: CHK-NP007
  action: set_size
  target: body
  value: 16pt
- id: FIX-NP001
  ref_check: CHK-NP008
  action: set_first_line_indent
  target: body
  value: 2em
- id: FIX-NP001
  ref_check: CHK-NP009
  action: set_line_spacing
  target: body
  value: 28.95pt
