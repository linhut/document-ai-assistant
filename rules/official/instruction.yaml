template_name: 指示
document_type: instruction
title:
  font: 方正小标宋简体
  font_fallback: SimSun
  size: 22pt
  align: center
  bold: false
  spacing_after: 20
body:
  font: 仿宋_GB2312
  font_fallback: FangSong
  size: 16pt
  line_spacing: 28.95pt
  first_line_indent: 2em
  align: justify
check_rules:
- id: CHK-I001
  name: 标题字体检查
  severity: P0
  field: title.font
  expected: 方正小标宋简体
  message: 标题应使用方正小标宋简体
- id: CHK-I002
  name: 标题字号检查
  severity: P0
  field: title.size
  expected: 22pt
  message: 标题应使用二号字(22pt)
- id: CHK-I003
  name: 标题居中检查
  severity: P0
  field: title.align
  expected: center
  message: 标题应居中对齐
- id: CHK-I004
  name: 正文字体检查
  severity: P0
  field: body.font
  expected: 仿宋_GB2312
  message: 正文应使用仿宋_GB2312字体
- id: CHK-I005
  name: 正文字号检查
  severity: P0
  field: body.size
  expected: 16pt
  message: 正文应使用三号字(16pt)
- id: CHK-I006
  severity: P1
  field: body.first_line_indent
  expected: 2em
  name: 正文首行缩进
  message: 正文首行应缩进2字符
- id: CHK-I007
  severity: P1
  field: body.line_spacing
  expected: 28.95pt
  name: 正文行距
  message: 正文行距应为固定值28-29磅
fix_rules:
- id: FIX-I001
  ref_check: CHK-I001
  action: set_font
  target: doc_title
  value: 方正小标宋简体
- id: FIX-I002
  ref_check: CHK-I002
  action: set_size
  target: doc_title
  value: 22pt
- id: FIX-I003
  ref_check: CHK-I003
  action: set_align
  target: doc_title
  value: center
- id: FIX-I004
  ref_check: CHK-I004
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-I005
  ref_check: CHK-I005
  action: set_size
  target: body
  value: 16pt
- id: FIX-I001
  ref_check: CHK-I006
  action: set_first_line_indent
  target: body
  value: 2em
- id: FIX-I001
  ref_check: CHK-I007
  action: set_line_spacing
  target: body
  value: 28.95pt
