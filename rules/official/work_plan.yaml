template_name: 工作方案
document_type: work_plan
title:
  font: 方正小标宋简体
  font_fallback: SimSun
  size: 22pt
  align: center
  bold: false
  spacing_after: 20
body:
  font: 仿宋_GB2312
  font_fallback: FangSong
  size: 16pt
  line_spacing: 28.95pt
  first_line_indent: 2em
  align: justify
check_rules:
- id: CHK-WP001
  name: 标题字体检查
  severity: P0
  field: title.font
  expected: 方正小标宋简体
  message: 标题应使用方正小标宋简体
- id: CHK-WP002
  name: 标题字号检查
  severity: P0
  field: title.size
  expected: 22pt
  message: 标题应使用二号字(22pt)
- id: CHK-WP003
  name: 标题居中检查
  severity: P0
  field: title.align
  expected: center
  message: 标题应居中对齐
- id: CHK-WP004
  name: 正文字体检查
  severity: P0
  field: body.font
  expected: 仿宋_GB2312
  message: 正文应使用仿宋_GB2312字体
- id: CHK-WP005
  name: 正文字号检查
  severity: P0
  field: body.size
  expected: 16pt
  message: 正文应使用三号字(16pt)
- id: CHK-WP006
  name: 正文首行缩进检查
  severity: P1
  field: body.first_line_indent
  expected: 2em
  message: 正文首行应缩进2字符
- id: CHK-WP007
  severity: P1
  field: body.line_spacing
  expected: 28.95pt
  name: 正文行距
  message: 正文行距应为固定值28-29磅
fix_rules:
- id: FIX-WP001
  ref_check: CHK-WP001
  action: set_font
  target: doc_title
  value: 方正小标宋简体
- id: FIX-WP002
  ref_check: CHK-WP002
  action: set_size
  target: doc_title
  value: 22pt
- id: FIX-WP003
  ref_check: CHK-WP003
  action: set_align
  target: doc_title
  value: center
- id: FIX-WP004
  ref_check: CHK-WP004
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-WP005
  ref_check: CHK-WP005
  action: set_size
  target: body
  value: 16pt
- id: FIX-WP006
  ref_check: CHK-WP006
  action: set_indent
  target: body
  value: 2em
- id: FIX-WP001
  ref_check: CHK-WP007
  action: set_line_spacing
  target: body
  value: 28.95pt
