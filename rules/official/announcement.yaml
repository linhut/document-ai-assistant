template_name: 通告
document_type: announcement

# --- 通告特有格式覆盖 ---
title:
  bold: true

# --- 通告特有内容检查 ---
check_rules:
  - id: CHK-A001
    name: 通告范围检查
    severity: P1
    field: content.scope
    expected: 明确适用范围
    message: 通告应明确适用范围和对象

  - id: CHK-A002
    name: 通告生效日期检查
    severity: P1
    field: content.effective_date
    expected: 包含施行日期
    message: 通告应注明施行日期
fix_rules: []
