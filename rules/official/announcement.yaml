template_name: 通告
document_type: announcement
title:
  font: 方正小标宋简体
  font_fallback: SimSun
  size: 22pt
  align: center
  bold: false
body:
  font: 仿宋_GB2312
  font_fallback: FangSong
  size: 16pt
  line_spacing: 28.95pt
  first_line_indent: 2em
  align: justify
check_rules:
- id: CHK-A001
  name: 标题字体检查
  severity: P0
  field: title.font
  expected: 方正小标宋简体
  message: 标题应使用方正小标宋简体
- id: CHK-A002
  name: 标题字号检查
  severity: P0
  field: title.size
  expected: 22pt
  message: 标题应使用二号字(22pt)
- id: CHK-A003
  name: 发布事项检查
  severity: P1
  field: content.items
  expected: 包含发布事项
  message: 通告应明确发布事项
- id: CHK-A004
  name: 执行时间检查
  severity: P1
  field: content.effective_date
  expected: 包含执行时间
  message: 通告应注明执行时间
- id: CHK-A005
  name: 发布单位检查
  severity: P0
  field: signature.unit
  expected: 包含发布单位
  message: 通告应注明发布单位
- id: CHK-A006
  name: 落款检查
  severity: P1
  field: signature.align
  expected: right
  message: 落款应右对齐
- id: CHK-A007
  severity: P0
  field: body.font
  expected: 仿宋_GB2312
  name: 正文字体
  message: 正文应使用仿宋_GB2312字体
- id: CHK-A008
  severity: P0
  field: body.size
  expected: 16pt
  name: 正文字号
  message: 正文应使用三号字（16pt）
- id: CHK-A009
  severity: P1
  field: body.first_line_indent
  expected: 2em
  name: 正文首行缩进
  message: 正文首行应缩进2字符
- id: CHK-A010
  severity: P1
  field: body.line_spacing
  expected: 28.95pt
  name: 正文行距
  message: 正文行距应为固定值28-29磅
fix_rules:
- id: FIX-A001
  ref_check: CHK-A001
  action: set_font
  target: doc_title
  value: 方正小标宋简体
- id: FIX-A002
  ref_check: CHK-A002
  action: set_size
  target: doc_title
  value: 22pt
- id: FIX-A003
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-A004
  action: set_size
  target: body
  value: 16pt
- id: FIX-A005
  action: set_align
  target: signature
  value: right
- id: FIX-A007
  ref_check: CHK-A007
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-A008
  ref_check: CHK-A008
  action: set_size
  target: body
  value: 16pt
- id: FIX-A001
  ref_check: CHK-A009
  action: set_first_line_indent
  target: body
  value: 2em
- id: FIX-A001
  ref_check: CHK-A010
  action: set_line_spacing
  target: body
  value: 28.95pt
