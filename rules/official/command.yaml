template_name: 命令（令）
document_type: command

# --- 命令特有格式覆盖 ---
title:
  bold: true

# --- 命令特有内容检查 ---
check_rules:
  - id: CHK-CM001
    name: 令号检查
    severity: P0
    field: header.doc_number
    expected: 包含令号
    message: 命令（令）应标注令号

  - id: CHK-CM002
    name: 签发人检查
    severity: P1
    field: signature.signer
    expected: 行政首长签署
    message: 命令应由行政首长签署
fix_rules: []
