template_name: 通报
document_type: bulletin
title:
  font: 方正小标宋简体
  font_fallback: SimSun
  size: 22pt
  align: center
  bold: false
body:
  font: 仿宋_GB2312
  font_fallback: FangSong
  size: 16pt
  line_spacing: 28.95pt
  first_line_indent: 2em
  align: justify
check_rules:
- id: CHK-BT001
  name: 标题字体检查
  severity: P0
  field: title.font
  expected: 方正小标宋简体
  message: 标题应使用方正小标宋简体
- id: CHK-BT002
  name: 标题字号检查
  severity: P0
  field: title.size
  expected: 22pt
  message: 标题应使用二号字(22pt)
- id: CHK-BT003
  name: 通报类型检查
  severity: P1
  field: structure.type
  expected: 表彰/批评/情况之一
  message: 通报应明确类型：表彰性、批评性或情况通报
- id: CHK-BT004
  name: 落款检查
  severity: P1
  field: signature.align
  expected: right
  message: 落款应右对齐
- id: CHK-BT005
  severity: P0
  field: body.font
  expected: 仿宋_GB2312
  name: 正文字体
  message: 正文应使用仿宋_GB2312字体
- id: CHK-BT006
  severity: P0
  field: body.size
  expected: 16pt
  name: 正文字号
  message: 正文应使用三号字（16pt）
- id: CHK-BT007
  severity: P1
  field: body.first_line_indent
  expected: 2em
  name: 正文首行缩进
  message: 正文首行应缩进2字符
- id: CHK-BT008
  severity: P1
  field: body.line_spacing
  expected: 28.95pt
  name: 正文行距
  message: 正文行距应为固定值28-29磅
fix_rules:
- id: FIX-BT001
  ref_check: CHK-BT001
  action: set_font
  target: doc_title
  value: 方正小标宋简体
- id: FIX-BT002
  ref_check: CHK-BT002
  action: set_size
  target: doc_title
  value: 22pt
- id: FIX-BT003
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-BT004
  action: set_align
  target: signature
  value: right
- id: FIX-BT005
  ref_check: CHK-BT005
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-BT006
  ref_check: CHK-BT006
  action: set_size
  target: body
  value: 16pt
- id: FIX-BT001
  ref_check: CHK-BT007
  action: set_first_line_indent
  target: body
  value: 2em
- id: FIX-BT001
  ref_check: CHK-BT008
  action: set_line_spacing
  target: body
  value: 28.95pt
