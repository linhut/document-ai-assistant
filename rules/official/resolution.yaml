template_name: 决议
document_type: resolution
title:
  font: 方正小标宋简体
  font_fallback: SimSun
  size: 22pt
  align: center
  bold: false
body:
  font: 仿宋_GB2312
  font_fallback: FangSong
  size: 16pt
  line_spacing: 28.95pt
  first_line_indent: 2em
  align: justify
check_rules:
- id: CHK-RS001
  name: 标题字体检查
  severity: P0
  field: title.font
  expected: 方正小标宋简体
  message: 标题应使用方正小标宋简体
- id: CHK-RS002
  name: 标题字号检查
  severity: P0
  field: title.size
  expected: 22pt
  message: 标题应使用二号字(22pt)
- id: CHK-RS003
  name: 事项结构检查
  severity: P1
  field: structure.items
  expected: 事项分条列项
  message: 决议事项应分条列项，层次清晰
- id: CHK-RS004
  name: 会议依据检查
  severity: P1
  field: structure.meeting_ref
  expected: 注明会议通过
  message: 决议应注明经何会议通过
- id: CHK-RS005
  severity: P0
  field: body.font
  expected: 仿宋_GB2312
  name: 正文字体
  message: 正文应使用仿宋_GB2312字体
- id: CHK-RS006
  severity: P0
  field: body.size
  expected: 16pt
  name: 正文字号
  message: 正文应使用三号字（16pt）
- id: CHK-RS007
  severity: P1
  field: body.first_line_indent
  expected: 2em
  name: 正文首行缩进
  message: 正文首行应缩进2字符
- id: CHK-RS008
  severity: P1
  field: body.line_spacing
  expected: 28.95pt
  name: 正文行距
  message: 正文行距应为固定值28-29磅
fix_rules:
- id: FIX-RS001
  ref_check: CHK-RS001
  action: set_font
  target: doc_title
  value: 方正小标宋简体
- id: FIX-RS002
  ref_check: CHK-RS002
  action: set_size
  target: doc_title
  value: 22pt
- id: FIX-RS003
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-RS004
  action: set_size
  target: body
  value: 16pt
- id: FIX-RS005
  ref_check: CHK-RS005
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-RS006
  ref_check: CHK-RS006
  action: set_size
  target: body
  value: 16pt
- id: FIX-RS001
  ref_check: CHK-RS007
  action: set_first_line_indent
  target: body
  value: 2em
- id: FIX-RS001
  ref_check: CHK-RS008
  action: set_line_spacing
  target: body
  value: 28.95pt
