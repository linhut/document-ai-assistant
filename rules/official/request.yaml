template_name: 请示
document_type: request
title:
  font: 方正小标宋简体
  font_fallback: SimSun
  size: 22pt
  align: center
  bold: false
body:
  font: 仿宋_GB2312
  font_fallback: FangSong
  size: 16pt
  line_spacing: 28.95pt
  first_line_indent: 2em
  align: justify
check_rules:
- id: CHK-R001
  name: 标题字体检查
  severity: P0
  field: title.font
  expected: 方正小标宋简体
  message: 标题应使用方正小标宋简体
- id: CHK-R002
  name: 标题字号检查
  severity: P0
  field: title.size
  expected: 22pt
  message: 标题应使用二号字(22pt)
- id: CHK-R003
  name: 标题居中检查
  severity: P0
  field: title.align
  expected: center
  message: 标题应居中对齐
- id: CHK-R004
  name: 正文行距检查
  severity: P1
  field: body.line_spacing
  expected: 28.95pt
  message: 正文行距应为固定值28.95pt
- id: CHK-R005
  name: 请示结语检查
  severity: P1
  field: ending.check
  expected: 包含请示结语
  message: 请示应以'妥否，请批示'等结语结尾
- id: CHK-R006
  name: 一文一事检查
  severity: P0
  field: content.single_topic
  expected: 一文一事
  message: 请示应遵循一文一事原则
- id: CHK-R007
  severity: P0
  field: body.font
  expected: 仿宋_GB2312
  name: 正文字体
  message: 正文应使用仿宋_GB2312字体
- id: CHK-R008
  severity: P0
  field: body.size
  expected: 16pt
  name: 正文字号
  message: 正文应使用三号字（16pt）
- id: CHK-R009
  severity: P1
  field: body.first_line_indent
  expected: 2em
  name: 正文首行缩进
  message: 正文首行应缩进2字符
fix_rules:
- id: FIX-R001
  ref_check: CHK-R001
  action: set_font
  target: doc_title
  value: 方正小标宋简体
- id: FIX-R002
  ref_check: CHK-R002
  action: set_size
  target: doc_title
  value: 22pt
- id: FIX-R003
  ref_check: CHK-R003
  action: set_align
  target: doc_title
  value: center
- id: FIX-R004
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-R005
  action: set_size
  target: body
  value: 16pt
- id: FIX-R007
  ref_check: CHK-R007
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-R008
  ref_check: CHK-R008
  action: set_size
  target: body
  value: 16pt
- id: FIX-R001
  ref_check: CHK-R009
  action: set_first_line_indent
  target: body
  value: 2em
