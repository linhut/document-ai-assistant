template_name: 技术方案
document_type: technical_proposal

# --- 技术方案特有格式覆盖 ---
# 正文使用四号(14pt)，区别于标准公文的三号(16pt)
body:
  size: 14pt

check_rules:
  # 格式检查 — 覆盖 _common 的 CHK-C005(16pt)
  - id: CHK-TP001
    name: 正文字号检查（技术方案）
    severity: P0
    field: body.size
    expected: 14pt
    message: 技术方案正文应使用四号字(14pt)
    category: format

  # 内容检查
  - id: CHK-TP002
    name: 技术背景检查
    severity: P1
    field: content.background
    expected: 包含技术背景
    message: 技术方案应包含项目背景和技术现状
    category: content

  - id: CHK-TP003
    name: 方案对比检查
    severity: P1
    field: content.alternatives
    expected: 有方案对比
    message: 技术方案应有多种方案的对比分析
    category: content

  - id: CHK-TP004
    name: 实施计划检查
    severity: P1
    field: content.implementation_plan
    expected: 有实施计划
    message: 技术方案应包含详细的实施计划和时间表
    category: content

fix_rules:
  - id: FIX-TP001
    ref_check: CHK-TP001
    action: set_size
    target: body
    value: 14pt
