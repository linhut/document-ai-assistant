template_name: 决定
document_type: decision

# --- 决定特有格式覆盖 ---
title:
  bold: true

# --- 决定特有内容检查 ---
check_rules:
  - id: CHK-D001
    name: 决定依据检查
    severity: P1
    field: content.legal_basis
    expected: 包含法规依据
    message: 决定应明确法规或事实依据

  - id: CHK-D002
    name: 决定事项检查
    severity: P1
    field: content.decision_items
    expected: 决定事项明确
    message: 决定事项应具体、明确
fix_rules: []
