template_name: 桌签
document_type: table_sign

# --- 桌签特有格式 ---
title:
  size: 50pt
  bold: true
body:
  size: 50pt
  bold: true
  align: center

# --- 桌签特有内容检查 ---
check_rules:
  - id: CHK-TS001
    name: 桌签字号检查
    severity: P0
    field: title.size
    expected: 50pt
    message: 桌签应使用大号字体以确保远距离可读
fix_rules:
  - id: FIX-TS001
    action: set_size
    target: doc_title
    value: 50pt
  - id: FIX-TS002
    action: set_bold
    target: doc_title
    value: true
  - id: FIX-TS003
    action: set_alignment
    target: doc_title
    value: center
