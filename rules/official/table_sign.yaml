template_name: 桌签
document_type: table_sign
title:
  font: 黑体
  font_fallback: SimHei
  size: 72pt
  align: center
  bold: true
body:
  font: 黑体
  font_fallback: SimHei
  size: 72pt
  line_spacing: 28.95pt
  first_line_indent: 0
  align: center
check_rules:
- id: CHK-TS001
  name: 字体检查
  severity: P0
  field: title.font
  expected: 黑体
  message: 桌签应使用黑体
- id: CHK-TS002
  name: 字号检查
  severity: P0
  field: title.size
  expected: 72pt
  message: 桌签字号应足够大，建议72pt以上
- id: CHK-TS003
  name: 居中检查
  severity: P0
  field: title.align
  expected: center
  message: 桌签内容应居中显示
- id: CHK-TS004
  severity: P0
  field: body.font
  expected: 仿宋_GB2312
  name: 正文字体
  message: 正文应使用仿宋_GB2312字体
- id: CHK-TS005
  severity: P0
  field: body.size
  expected: 16pt
  name: 正文字号
  message: 正文应使用三号字（16pt）
- id: CHK-TS006
  severity: P1
  field: body.first_line_indent
  expected: 2em
  name: 正文首行缩进
  message: 正文首行应缩进2字符
- id: CHK-TS007
  severity: P1
  field: body.line_spacing
  expected: 28.95pt
  name: 正文行距
  message: 正文行距应为固定值28-29磅
fix_rules:
- id: FIX-TS001
  ref_check: CHK-TS001
  action: set_font
  target: doc_title
  value: 黑体
- id: FIX-TS002
  ref_check: CHK-TS002
  action: set_size
  target: doc_title
  value: 72pt
- id: FIX-TS003
  action: set_align
  target: doc_title
  value: center
- id: FIX-TS004
  ref_check: CHK-TS004
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-TS005
  ref_check: CHK-TS005
  action: set_size
  target: body
  value: 16pt
- id: FIX-TS001
  ref_check: CHK-TS006
  action: set_first_line_indent
  target: body
  value: 2em
- id: FIX-TS001
  ref_check: CHK-TS007
  action: set_line_spacing
  target: body
  value: 28.95pt
