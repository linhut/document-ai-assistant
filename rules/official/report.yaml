template_name: 报告
document_type: report
title:
  font: 方正小标宋简体
  font_fallback: SimSun
  size: 22pt
  align: center
  bold: false
body:
  font: 仿宋_GB2312
  font_fallback: FangSong
  size: 16pt
  line_spacing: 28.95pt
  first_line_indent: 2em
  align: justify
check_rules:
- id: CHK-RPT001
  name: 标题字体检查
  severity: P0
  field: title.font
  expected: 方正小标宋简体
  message: 标题应使用方正小标宋简体
- id: CHK-RPT002
  name: 标题字号检查
  severity: P0
  field: title.size
  expected: 22pt
  message: 标题应使用二号字(22pt)
- id: CHK-RPT003
  name: 标题居中检查
  severity: P0
  field: title.align
  expected: center
  message: 标题应居中对齐
- id: CHK-RPT004
  name: 正文行距检查
  severity: P1
  field: body.line_spacing
  expected: 28.95pt
  message: 正文行距应为固定值28.95pt
- id: CHK-RPT005
  name: 结构完整性检查
  severity: P2
  field: structure.completeness
  expected: 包含基本情况、主要做法、存在问题、下步打算
  message: 报告应包含基本情况、主要做法、存在问题等要素
- id: CHK-RPT006
  name: 落款右对齐检查
  severity: P1
  field: signature.align
  expected: right
  message: 落款应右对齐
- id: CHK-RPT007
  severity: P0
  field: body.font
  expected: 仿宋_GB2312
  name: 正文字体
  message: 正文应使用仿宋_GB2312字体
- id: CHK-RPT008
  severity: P0
  field: body.size
  expected: 16pt
  name: 正文字号
  message: 正文应使用三号字（16pt）
- id: CHK-RPT009
  severity: P1
  field: body.first_line_indent
  expected: 2em
  name: 正文首行缩进
  message: 正文首行应缩进2字符
fix_rules:
- id: FIX-RPT001
  ref_check: CHK-RPT001
  action: set_font
  target: doc_title
  value: 方正小标宋简体
- id: FIX-RPT002
  ref_check: CHK-RPT002
  action: set_size
  target: doc_title
  value: 22pt
- id: FIX-RPT003
  ref_check: CHK-RPT003
  action: set_align
  target: doc_title
  value: center
- id: FIX-RPT004
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-RPT005
  action: set_size
  target: body
  value: 16pt
- id: FIX-RPT006
  action: set_align
  target: signature
  value: right
- id: FIX-RPT007
  ref_check: CHK-RPT007
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-RPT008
  ref_check: CHK-RPT008
  action: set_size
  target: body
  value: 16pt
- id: FIX-RPT001
  ref_check: CHK-RPT009
  action: set_first_line_indent
  target: body
  value: 2em
