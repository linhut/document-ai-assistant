template_name: 制度
document_type: regulation
title:
  font: 方正小标宋简体
  font_fallback: SimSun
  size: 22pt
  align: center
  bold: false
  spacing_after: 20
body:
  font: 仿宋_GB2312
  font_fallback: FangSong
  size: 16pt
  line_spacing: 28.95pt
  first_line_indent: 2em
  align: justify
check_rules:
- id: CHK-REG001
  name: 标题字体检查
  severity: P0
  field: title.font
  expected: 方正小标宋简体
  message: 标题应使用方正小标宋简体
- id: CHK-REG002
  name: 标题字号检查
  severity: P0
  field: title.size
  expected: 22pt
  message: 标题应使用二号字(22pt)
- id: CHK-REG003
  name: 标题居中检查
  severity: P0
  field: title.align
  expected: center
  message: 标题应居中对齐
- id: CHK-REG004
  name: 正文字体检查
  severity: P0
  field: body.font
  expected: 仿宋_GB2312
  message: 正文应使用仿宋_GB2312字体
- id: CHK-REG005
  name: 正文字号检查
  severity: P0
  field: body.size
  expected: 16pt
  message: 正文应使用三号字(16pt)
- id: CHK-REG006
  name: 章节编号检查
  severity: P1
  field: body.numbering
  expected: 一、二、三
  message: 章节编号应使用中文大写数字
- id: CHK-REG007
  severity: P1
  field: body.first_line_indent
  expected: 2em
  name: 正文首行缩进
  message: 正文首行应缩进2字符
- id: CHK-REG008
  severity: P1
  field: body.line_spacing
  expected: 28.95pt
  name: 正文行距
  message: 正文行距应为固定值28-29磅
fix_rules:
- id: FIX-REG001
  ref_check: CHK-REG001
  action: set_font
  target: doc_title
  value: 方正小标宋简体
- id: FIX-REG002
  ref_check: CHK-REG002
  action: set_size
  target: doc_title
  value: 22pt
- id: FIX-REG003
  ref_check: CHK-REG003
  action: set_align
  target: doc_title
  value: center
- id: FIX-REG004
  ref_check: CHK-REG004
  action: set_font
  target: body
  value: 仿宋_GB2312
- id: FIX-REG005
  ref_check: CHK-REG005
  action: set_size
  target: body
  value: 16pt
- id: FIX-REG001
  ref_check: CHK-REG007
  action: set_first_line_indent
  target: body
  value: 2em
- id: FIX-REG001
  ref_check: CHK-REG008
  action: set_line_spacing
  target: body
  value: 28.95pt
