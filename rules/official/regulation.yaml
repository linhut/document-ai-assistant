template_name: 制度
document_type: regulation

# --- 制度特有内容检查 ---
check_rules:
  - id: CHK-REG001
    name: 制度条款检查
    severity: P1
    field: content.clauses
    expected: 条款明确
    message: 制度应条文清晰、逻辑严密

  - id: CHK-REG002
    name: 制度施行日期检查
    severity: P1
    field: content.effective_date
    expected: 包含施行日期
    message: 制度应注明施行日期
fix_rules: []
